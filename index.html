<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在前往 Shanfatech 評論頁面...</title>
    <script>
        window.onload = function() {
            // ==========================================================
            // 【請把下方引號內的文字，替換成您在第一階段找到的 FB 數字 ID】
            var pageId = "655340037669937"; 
            // ==========================================================
            
            var webUrl = "https://www.facebook.com/Shanfatech/reviews";
            var iosAppUrl = "fb://profile/" + pageId;
            var androidAppUrl = "fb://page/" + pageId;
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = iosAppUrl;
                setTimeout(function() { window.location.href = webUrl; }, 1500);
            } 
            else if (/android/i.test(userAgent)) {
                window.location.href = androidAppUrl;
                setTimeout(function() { window.location.href = webUrl; }, 1500);
            } 
            else {
                window.location.href = webUrl;
            }
        };
    </script>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { text-align: center; }
        .spinner { border: 4px solid rgba(0,0,0,.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #1877f2; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>正在為您開啟 Facebook 評論頁面...</p>
    </div>
</body>
</html>
